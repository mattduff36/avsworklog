name: Release version bump

on:
  push:
    branches:
      - main

jobs:
  bump-release-version:
    if: ${{ !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump release version
        run: npm run version:bump -- "${{ github.event.before }}" "${{ github.event.after }}"

      - name: Commit and push version files
        run: |
          if git diff --quiet -- lib/config/release-version.json docs_private/release-log.md; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/config/release-version.json docs_private/release-log.md
          VERSION=$(node -e "const v=require('./lib/config/release-version.json'); console.log(\`\${v.mmyy}.\${v.major}.\${v.minor}\`)")
          git commit -m "chore(release): bump to ${VERSION} [skip version]"
          git push
